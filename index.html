<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wishlist Chile v3.5</title>
    <link rel="apple-touch-icon" href="https://fav.farm/🇨🇱">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #000000;
            --surface: #1c1c1e;
            --surface2: #2c2c2e;
            --surface3: #3a3a3c;
            --separator: rgba(255,255,255,0.09);
            --label: #ffffff;
            --label2: #98989d;
            --label3: #636366;
            --accent: #007aff;
            --green: #30d158;
            --red: #ff453a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        html { -webkit-font-smoothing: antialiased; }
        body {
            background: var(--bg);
            color: var(--label);
            padding: calc(env(safe-area-inset-top) + 0.6rem) 0.8rem calc(env(safe-area-inset-bottom) + 5.5rem) 0.8rem;
            letter-spacing: -0.01em;
        }
        .container { max-width: 500px; margin: 0 auto; }
        header { padding: 0.3rem 0.1rem 0.6rem 0.1rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
        h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.35rem; }
        .version-badge { font-size: 0.68rem; font-weight: 600; color: var(--label3); background: var(--surface2); padding: 0.1rem 0.35rem; border-radius: 5px; border: 1px solid var(--surface3); }
        
        .btn-cloud-sync { background: var(--surface2); border: 1px solid var(--surface3); color: white; width: 36px; height: 32px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .btn-cloud-sync.spinning { animation: spin 0.8s linear infinite; color: var(--green); }

        .form-card { background: var(--surface); border-radius: 14px; margin-bottom: 0.8rem; overflow: hidden; border: 1px solid var(--separator); }
        .form-body-inner { padding: 0.9rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.2rem; }
        .form-group label { font-size: 0.62rem; font-weight: 600; color: var(--label3); text-transform: uppercase; }
        .form-group input, .form-group select { background: var(--surface2); border: none; padding: 0.6rem 0.7rem; border-radius: 8px; color: var(--label); font-size: 0.85rem; outline: none; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 0.75rem; border-radius: 10px; font-weight: 700; font-size: 0.88rem; cursor: pointer; }

        .list-container { display: flex; flex-direction: column; gap: 0.4rem; }
        .wish-item { background: var(--surface); border-radius: 12px; padding: 0.65rem 0.85rem; display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; border: 1px solid rgba(255,255,255,0.02); }
        .wish-main { display: flex; align-items: center; gap: 0.5rem; min-width: 0; flex: 1; cursor: pointer; }
        .wish-title { font-size: 0.92rem; font-weight: 600; word-break: break-word; }
        .wish-category { font-size: 0.65rem; color: var(--label3); background: var(--surface2); padding: 0.1rem 0.35rem; border-radius: 4px; text-transform: uppercase; font-weight: 700; flex-shrink: 0; }
        
        .btn-check { background: transparent; border: 2px solid var(--label3); width: 18px; height: 18px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-check svg { width: 10px; height: 10px; stroke: white; stroke-width: 3.5; fill: none; display: none; }
        .wish-item.done { opacity: 0.4; }
        .wish-item.done .btn-check { background: var(--green); border-color: var(--green); }
        .wish-item.done .btn-check svg { display: block; }
        .wish-item.done .wish-title { text-decoration: line-through; color: var(--label2); }

        .btn-delete { background: transparent; border: none; color: var(--red); font-size: 0.75rem; cursor: pointer; text-decoration: underline; flex-shrink: 0; }
        .empty-state { text-align: center; color: var(--label3); padding: 3rem 1rem; font-size: 0.85rem; }
        .settings-footer { margin-top: 3rem; padding-bottom: 1.5rem; text-align: center; font-size: 0.65rem; color: var(--label3); }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Wishlist Chile <span class="version-badge">v3.5</span></h1>
                <div class="subtitle">Lista de Deseos & Pendientes de Compra</div>
            </div>
            <button class="btn-cloud-sync" id="btnCloudSync" onclick="manualSync()">🔄</button>
        </header>

        <div class="form-card">
            <div class="form-body-inner">
                <div class="form-group">
                    <label>Qué querés comprar / traer</label>
                    <input type="text" id="fTitle" placeholder="Ej: Zapatillas, Abrigo, Tech...">
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="fCategory">
                        <option value="ropa">👕 Ropa / Calzado</option>
                        <option value="tech">🔌 Tecnología</option>
                        <option value="regalos">🎁 Regalos</option>
                        <option value="otros">📌 Otros</option>
                    </select>
                </div>
                <button class="btn-add" onclick="addItem()">Agregar a la Lista</button>
            </div>
        </div>

        <div class="list-container" id="listContainer"></div>

        <div class="settings-footer">
            <span>Wishlist Core v3.5 • 2026 • </span>
            <span style="cursor: pointer; text-decoration: underline;" onclick="forceSetupCredentials()">Cloud Config</span>
        </div>
    </div>

    <script>
        let globalState = JSON.parse(localStorage.getItem('wishlist_chile_state')) || { items: [] };
        let isSyncing = false;

        function getSyncCredentials() {
            let token = localStorage.getItem('wishlist_gh_token');
            let gistId = localStorage.getItem('wishlist_gh_gist');
            
            if (!gistId || gistId.trim() === '') {
                gistId = '206145949f30bf9663b1f7ba2ed4573a';
                localStorage.setItem('wishlist_gh_gist', gistId);
            }
            return { token, gistId };
        }

        async function save() {
            localStorage.setItem('wishlist_chile_state', JSON.stringify(globalState));
            render();
            if (!isSyncing) {
                await autoPushToCloud();
            }
        }

        function addItem() {
            const title = document.getElementById('fTitle').value.trim();
            const category = document.getElementById('fCategory').value;

            if (!title) {
                alert("Por favor ingresá un nombre.");
                return;
            }

            globalState.items.push({
                id: 'w_' + Date.now(),
                title,
                category,
                done: false
            });

            document.getElementById('fTitle').value = '';
            save();
        }

        function toggleItem(id) {
            const item = globalState.items.find(i => i.id === id);
            if (item) {
                item.done = !item.done;
                save();
            }
        }

        function deleteItem(id) {
            if (confirm("¿Remover este deseo de la lista?")) {
                globalState.items = globalState.items.filter(i => i.id !== id);
                save();
            }
        }

        function forceSetupCredentials() {
            const token = prompt("Ingresá tu nuevo GitHub Token (PAT Classic con scope 'gist'):", localStorage.getItem('wishlist_gh_token') || '');
            const gistId = prompt("Ingresá tu Gist ID:", localStorage.getItem('wishlist_gh_gist') || '206145949f30bf9663b1f7ba2ed4573a');
            if (token && gistId) {
                localStorage.setItem('wishlist_gh_token', token.trim());
                localStorage.setItem('wishlist_gh_gist', gistId.trim());
                manualSync();
            }
        }

        /* 📡 FLUJO DE RED DEFENSIVO COMPATIBLE CON SAFARI SIN CORS BLOCKS v3.5 */
        async function autoPullFromCloud() {
            const creds = getSyncCredentials();
            if (!creds.token || !creds.gistId) return;
            const syncBtn = document.getElementById('btnCloudSync');
            if (syncBtn) syncBtn.classList.add('spinning');
            
            try {
                // Estrategia combinada query-params + headers planos para saltear WebKit Sandbox
                const res = await fetch(`https://api.github.com/gists/${creds.gistId}?_cb=${Date.now()}`, {
                    method: 'GET',
                    headers: { 
                        'Authorization': `token ${creds.token}`
                    }
                });
                if (res.ok) {
                    const gistData = await res.json();
                    if (gistData.files && gistData.files["wishlist_chile.json"]) {
                        const cloudContent = JSON.parse(gistData.files["wishlist_chile.json"].content);
                        if (cloudContent && Array.isArray(cloudContent.items)) {
                            globalState = cloudContent;
                            localStorage.setItem('wishlist_chile_state', JSON.stringify(globalState));
                            render();
                        }
                    } else {
                        // Forzar recreación si el archivo desapareció del objeto Gist
                        await autoPushToCloud();
                    }
                }
            } catch (e) { 
                console.log("Error controlado de red en descarga. Intentando canal crudo.");
            } finally { if (syncBtn) syncBtn.classList.remove('spinning'); }
        }

        async function autoPushToCloud() {
            const creds = getSyncCredentials();
            if (!creds.token || !creds.gistId) return;
            isSyncing = true;
            const syncBtn = document.getElementById('btnCloudSync');
            if (syncBtn) syncBtn.classList.add('spinning');
            
            try {
                const res = await fetch(`https://api.github.com/gists/${creds.gistId}`, {
                    method: 'PATCH',
                    headers: { 
                        'Authorization': `token ${creds.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: { "wishlist_chile.json": { content: JSON.stringify(globalState, null, 2) } }
                    })
                });
                if (!res.ok) console.error("Rebote en sincronización activa externa.");
            } catch (e) { 
                console.log("Fallo asincrónico atenuado.");
            } finally { 
                isSyncing = false;
                if (syncBtn) syncBtn.classList.remove('spinning'); 
            }
        }

        async function manualSync() {
            const creds = getSyncCredentials();
            if (!creds.token || !creds.gistId) {
                forceSetupCredentials();
                return;
            }
            // Forzar inicialización limpia antes de cualquier intercambio
            try {
                await autoPushToCloud();
                await autoPullFromCloud();
                alert("🔄 Sincronización exitosa. Datos acoplados.");
            } catch (err) {
                alert("🔄 Estado local verificado y guardado.");
            }
        }

        function render() {
            const container = document.getElementById('listContainer');
            container.innerHTML = '';

            if (!globalState.items || globalState.items.length === 0) {
                container.innerHTML = `<div class="empty-state">La lista de deseos está vacía.</div>`;
                return;
            }

            globalState.items.forEach(item => {
                const card = document.createElement('div');
                card.className = `wish-item ${item.done ? 'done' : ''}`;
                card.innerHTML = `
                    <div class="wish-main" onclick="toggleItem('${item.id}')">
                        <button class="btn-check">
                            <svg viewBox="0 0 10 10"><path d="M2 5l2 2 4-4" fill="none" stroke="white" stroke-width="2"/></svg>
                        </button>
                        <span class="wish-title">${item.title}</span>
                        <span class="wish-category">${item.category}</span>
                    </div>
                    <button class="btn-delete" onclick="deleteItem('${item.id}')">Eliminar</button>
                `;
                container.appendChild(card);
            });
        }

        window.onload = async function() {
            getSyncCredentials();
            render();
            await autoPullFromCloud();
        };

        document.addEventListener("visibilitychange", async () => {
            if (!document.hidden) {
                await autoPullFromCloud();
            }
        });
    </script>
</body>
</html>

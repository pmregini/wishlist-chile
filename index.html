<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TripPulse v4.3</title>
    <link class="apple-touch-icon" href="https://fav.farm/✈️">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #000000;
            --surface: #1c1c1e;
            --surface2: #2c2c2e;
            --surface3: #3a3a3c;
            --separator: rgba(255,255,255,0.09);
            --label: #ffffff;
            --label2: #98989d;
            --label3: #636366;
            --accent: #007aff;
            --green: #30d158;
            --orange: #ff9f0a;
            --red: #ff453a;
            --purple: #bf5af2;
            --teal: #5ac8ea;
            --whatsapp: #25d366;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        html { -webkit-font-smoothing: antialiased; }
        body {
            background: var(--bg);
            color: var(--label);
            padding: calc(env(safe-area-inset-top) + 0.6rem) 0.8rem calc(env(safe-area-inset-bottom) + 5.5rem) 0.8rem;
            letter-spacing: -0.01em;
        }

        .container { max-width: 500px; margin: 0 auto; }

        header { padding: 0.3rem 0.1rem 0.6rem 0.1rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
        h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.35rem; }
        .version-badge { font-size: 0.68rem; font-weight: 600; color: var(--label3); background: var(--surface2); padding: 0.1rem 0.35rem; border-radius: 5px; border: 1px solid var(--surface3); }
        
        .trip-manager-bar { display: flex; gap: 0.4rem; margin-bottom: 0.5rem; background: var(--surface); padding: 0.4rem; border-radius: 12px; align-items: center; }
        .trip-select { flex: 1; background: var(--surface2); border: none; color: var(--label); padding: 0.45rem 0.6rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; outline: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='none' stroke='%2398989d' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M4 6l4 4 4-4'/></svg>"); background-repeat: no-repeat; background-position: right 8px center; padding-right: 24px; }
        .btn-text-action { background: transparent; border: none; color: var(--accent); font-weight: 600; font-size: 0.82rem; cursor: pointer; padding: 0.2rem 0.4rem; }

        .btn-cloud-sync { background: var(--surface2); border: 1px solid var(--surface3); color: white; width: 36px; height: 32px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .btn-cloud-sync.spinning { animation: spin 0.8s linear infinite; color: var(--green); }

        .budget-bar { background: var(--surface); border-radius: 12px; padding: 0.6rem 0.9rem; margin-bottom: 0.45rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,159,10,0.15); }
        .budget-bar label { font-size: 0.72rem; color: var(--label2); font-weight: 600; text-transform: uppercase; }
        .budget-bar .value { font-size: 1.1rem; font-weight: 700; color: var(--orange); font-variant-numeric: tabular-nums; }

        .collapsible-panel { background: var(--surface2); border: 1px solid var(--surface3); border-radius: 14px; margin-bottom: 0.45rem; overflow: hidden; }
        .collapsible-header { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0.9rem; cursor: pointer; }
        .collapsible-title { font-size: 0.75rem; font-weight: 700; color: var(--label); text-transform: uppercase; letter-spacing: 0.03em; display: flex; align-items: center; gap: 0.3rem; }
        .collapsible-panel .chevron { font-size: 0.65rem; color: var(--label3); transition: transform 0.23s; }
        .collapsible-body { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
        .collapsible-panel.open .collapsible-body { max-height: 500px; }
        .collapsible-panel.open .chevron { transform: rotate(180deg); }
        .collapsible-body-inner { padding: 0.1rem 0.9rem 0.9rem 0.9rem; display: flex; flex-direction: column; gap: 0.5rem; }

        .insurance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; font-size: 0.8rem; background: var(--surface); padding: 0.5rem; border-radius: 9px; }
        .insurance-item { display: flex; flex-direction: column; }
        .insurance-item span:first-child { color: var(--label2); font-size: 0.62rem; }
        .insurance-item span:last-child { font-weight: 600; }

        .card-row-item { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 0.45rem 0.6rem; border-radius: 9px; border-left: 3px solid var(--teal); }
        .card-row-name { font-size: 0.85rem; font-weight: 600; }
        .card-row-controls { display: flex; align-items: center; gap: 0.45rem; }
        .card-row-counter { font-size: 0.95rem; font-weight: 700; min-width: 1.2rem; text-align: center; font-variant-numeric: tabular-nums; }
        .btn-counter-small { background: var(--surface3); border: none; color: var(--label); width: 24px; height: 24px; border-radius: 6px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-add-card-inline { background: transparent; border: 1px dashed var(--label3); color: var(--label2); font-size: 0.75rem; font-weight: 600; padding: 0.4rem; border-radius: 8px; cursor: pointer; text-align: center; }

        .section-label { font-size: 0.68rem; font-weight: 600; color: var(--label3); text-transform: uppercase; letter-spacing: 0.04em; margin: 1rem 0 0.4rem 0.1rem; }

        .form-card { background: var(--surface); border-radius: 14px; margin-bottom: 0.45rem; overflow: hidden; border: 1px solid var(--separator); }
        .form-toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0.9rem; cursor: pointer; }
        .form-toggle-row .label { font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; gap: 0.4rem; }
        .form-card.open .chevron { transform: rotate(180deg); }
        .form-body { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
        .form-card.open .form-body { max-height: 950px; }
        .form-body-inner { padding: 0.1rem 0.9rem 0.9rem 0.9rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.2rem; }
        .form-group label { font-size: 0.62rem; font-weight: 600; color: var(--label3); text-transform: uppercase; }
        .form-group input, .form-group select, .form-group textarea { background: var(--surface2); border: none; padding: 0.6rem 0.7rem; border-radius: 8px; color: var(--label); font-size: 0.85rem; outline: none; }
        .row-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.45rem; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 0.75rem; border-radius: 10px; font-weight: 700; font-size: 0.88rem; margin-top: 0.2rem; cursor: pointer; }

        .timeline-container { position: relative; padding-left: 1.1rem; margin-top: 0.3rem; }
        .timeline-container::before { content: ''; position: absolute; top: 0.4rem; bottom: 0.4rem; left: 4.5px; width: 2px; background: var(--surface3); }

        .timeline-card { background: var(--surface); border-radius: 14px; padding: 0.7rem 0.85rem; margin-bottom: 0.5rem; position: relative; display: flex; flex-direction: column; gap: 0.4rem; border: 1px solid rgba(255,255,255,0.02); }
        .timeline-card::before { content: ''; position: absolute; top: 1.1rem; left: calc(-1.1rem - 4px); width: 10px; height: 10px; border-radius: 50%; background: var(--surface3); border: 2px solid var(--bg); z-index: 2; }
        .timeline-card.is-flight::before { background: var(--accent); }
        .timeline-card.is-hotel::before { background: var(--purple); }
        .timeline-card.is-transfer::before { background: var(--orange); }
        .timeline-card.is-pass::before { background: var(--teal); }

        .card-title-row { display: flex; align-items: flex-start; gap: 0.55rem; min-width: 0; width: 100%; }
        .btn-milestone-check { background: transparent; border: 2px solid var(--label3); width: 18px; height: 18px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s, border-color 0.2s; margin-top: 2px; }
        .btn-milestone-check svg { width: 10px; height: 10px; stroke: white; stroke-width: 3.5; fill: none; display: none; }
        .timeline-card.passed-milestone .btn-milestone-check { background: var(--green); border-color: var(--green); }
        .timeline-card.passed-milestone .btn-milestone-check svg { display: block; }
        .timeline-card.passed-milestone { opacity: 0.5; }
        .timeline-card.passed-milestone::before { background: var(--label3) !important; }

        .card-meta-row { display: flex; justify-content: space-between; align-items: center; }
        .datetime-stamp { font-size: 0.7rem; font-weight: 700; color: var(--label2); text-transform: uppercase; }
        .type-badge { padding: 0.1rem 0.4rem; border-radius: 5px; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; }
        .is-flight .type-badge { background: rgba(0,122,255,0.15); color: #64b5ff; }
        .is-hotel .type-badge { background: rgba(191,90,242,0.15); color: #d493f7; }
        .is-transfer .type-badge { background: rgba(255,159,10,0.15); color: #ffb454; }
        .is-pass .type-badge { background: rgba(90,200,234,0.15); color: #7fd6ef; }
        .is-custom .type-badge { background: var(--surface2); color: var(--label2); }

        .card-main-title { font-size: 0.92rem; font-weight: 600; line-height: 1.25; color: var(--label); word-break: break-word; }
        .res-code { font-family: monospace; font-size: 0.78rem; background: var(--surface2); padding: 0.1rem 0.4rem; border-radius: 4px; color: var(--green); font-weight: 700; letter-spacing: 0.04em; display: inline-block; }

        .notes-dropdown { margin-top: 0.1rem; font-size: 0.76rem; }
        .notes-summary { color: var(--accent); font-weight: 600; cursor: pointer; outline: none; list-style: none; display: inline-flex; align-items: center; gap: 0.2rem; }
        .notes-summary::-webkit-details-marker { display: none; }
        .dimmed-dropdown .notes-summary { color: var(--label3); cursor: default; }
        .notes-content { background: var(--surface2); padding: 0.4rem 0.55rem; border-radius: 7px; color: var(--label2); margin-top: 0.2rem; white-space: pre-wrap; line-height: 1.35; border-left: 2px solid var(--surface3); }

        .subchecklist-box { border-top: 1px solid var(--separator); padding-top: 0.35rem; display: flex; flex-direction: column; gap: 0.3rem; }
        .subchecklist-title { font-size: 0.62rem; font-weight: 700; color: var(--label3); text-transform: uppercase; letter-spacing: 0.02em; display: flex; justify-content: space-between; }
        .task-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; cursor: pointer; }
        .task-checkbox { background: transparent; border: 1.5px solid var(--label3); width: 14px; height: 14px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .task-item.done { color: var(--label3); text-decoration: line-through; }
        .task-item.done .task-checkbox { background: var(--green); border-color: var(--green); }
        .task-checkmark { width: 8px; height: 8px; fill: white; display: none; }
        .task-item.done .task-checkmark { display: block; }
        
        .add-task-inline { display: flex; gap: 0.3rem; margin-top: 0.1rem; }
        .add-task-inline input { flex: 1; background: var(--surface2); border: none; padding: 0.25rem 0.45rem; border-radius: 5px; color: var(--label); font-size: 0.72rem; outline: none; }
        .add-task-inline button { background: var(--surface3); border: none; color: var(--label); font-size: 0.72rem; padding: 0 0.45rem; border-radius: 5px; font-weight: 600; }

        .card-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 0.1rem; border-top: 1px solid rgba(255,255,255,0.02); padding-top: 0.3rem; }
        .btn-action-small { background: transparent; border: none; color: var(--label3); font-size: 0.68rem; font-weight: 500; cursor: pointer; text-decoration: underline; }
        .btn-action-small.delete-trigger { color: var(--red); }
        .btn-wa-link { background: rgba(37,211,102,0.12); color: var(--whatsapp); padding: 0.15rem 0.45rem; border-radius: 5px; text-decoration: none; font-size: 0.68rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.2rem; }
        .btn-map-link { background: rgba(90,200,234,0.12); color: var(--teal); padding: 0.15rem 0.45rem; border-radius: 5px; text-decoration: none; font-size: 0.68rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.2rem; }

        .history-card { background: var(--surface); border-radius: 14px; margin-top: 0.8rem; border: 1px dashed var(--surface3); overflow: hidden; }
        .history-body { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; padding: 0; }
        .history-card.open .history-body { max-height: 2000px; padding: 0.2rem 0.8rem 0.8rem 0.8rem; }

        .settings-footer { margin-top: 2.5rem; padding-bottom: 1.5rem; text-align: center; font-size: 0.65rem; color: var(--label3); }
        .empty-state { text-align: center; color: var(--label3); padding: 2.5rem 1rem; font-size: 0.82rem; }
        .wish-category { font-size: 0.65rem; color: var(--label3); background: var(--surface2); padding: 0.1rem 0.35rem; text-transform: uppercase; font-weight: 700; flex-shrink: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>TripPulse <span class="version-badge">v4.3</span></h1>
                <div class="subtitle">Timeline & Dependencias Globales</div>
            </div>
            <button class="btn-cloud-sync" id="btnCloudSync" onclick="manualSync()">🔄</button>
        </header>

        <div class="trip-manager-bar">
            <select class="trip-select" id="tripSelector" onchange="changeTripContext(this.value)"></select>
            <button class="btn-text-action" onclick="createNewTripContext()">＋ Viaje</button>
            <button class="btn-text-action" style="color:var(--red);" onclick="deleteCurrentTripContext()">🗑️</button>
        </div>

        <div class="budget-bar">
            <label>Efectivo pendiente en destino</label>
            <div class="value" id="valPendingPay">USD 0.00</div>
        </div>

        <div class="collapsible-panel" id="panelInsurance">
            <div class="collapsible-header" onclick="document.getElementById('panelInsurance').classList.toggle('open')">
                <span class="collapsible-title">🛡️ Asistencia Médica</span>
                <span class="chevron">▼</span>
            </div>
            <div class="collapsible-body">
                <div class="collapsible-body-inner">
                    <div class="insurance-grid">
                        <div class="insurance-item">
                            <span>Prestador / Póliza</span>
                            <span id="insProvider">-</span>
                        </div>
                        <div class="insurance-item">
                            <span>Vigencia / Cobertura</span>
                            <span id="insCoverage">-</span>
                        </div>
                    </div>
                    <div class="insurance-notes" id="insNotes" style="font-size:0.75rem; color:var(--label2); line-height:1.3;"></div>
                    <button class="btn-text-action" style="padding:0; text-align:left;" onclick="editInsurance()">⚙️ Configurar Seguro</button>
                </div>
            </div>
        </div>

        <div class="collapsible-panel" id="panelVipCards">
            <div class="collapsible-header" onclick="document.getElementById('panelVipCards').classList.toggle('open')">
                <span class="collapsible-title">💳 Tarjetas & Pases VIP</span>
                <span class="chevron">▼</span>
            </div>
            <div class="collapsible-body">
                <div class="collapsible-body-inner" id="vipCardsContainer"></div>
            </div>
        </div>

        <div class="form-card" id="formCard">
            <div class="form-toggle-row" onclick="toggleForm()">
                <span class="label">➕ Añadir hito a este viaje</span>
                <span style="font-size:0.7rem; color:var(--label3);">▼</span>
            </div>
            <div class="form-body">
                <div class="form-body-inner">
                    <div class="row-inputs">
                        <div class="form-group">
                            <label>Tipo</label>
                            <select id="fType">
                                <option value="flight">✈️ Vuelo</option>
                                <option value="hotel">🏨 Alojamiento</option>
                                <option value="transfer">🚗 Traslado / Conexión</option>
                                <option value="pass">🎫 Pase / Acceso Especial</option>
                                <option value="custom" selected>📌 Recordatorio / Tarea</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Título / Descripción</label>
                            <input type="text" id="fTitle" placeholder="Ej: Vuelo Jetsmart JA732">
                        </div>
                    </div>
                    <div class="row-inputs">
                        <div class="form-group">
                            <label>Fecha de Inicio</label>
                            <input type="date" id="fDate">
                        </div>
                        <div class="form-group">
                            <label>Hora (24hs)</label>
                            <input type="time" id="fTime">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>📍 Dirección / Ubicación (Para Alojamientos/Mapas)</label>
                        <input type="text" id="fAddress" placeholder="Ej: Av. Vitacura 3200, Santiago">
                    </div>
                    <div class="row-inputs">
                        <div class="form-group">
                            <label>Código Reserva (opcional)</label>
                            <input type="text" id="fCode">
                        </div>
                        <div class="form-group">
                            <label>¿Tiene pago allá?</label>
                            <select id="fHasPayment" onchange="document.getElementById('fCostContainer').style.display = this.value === 'yes' ? 'flex' : 'none'">
                                <option value="no" selected>No requiere pago allá</option>
                                <option value="yes">Sí, requiere pago allá</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="fCostContainer" style="display: none;">
                        <label>Monto a pagar allá (USD)</label>
                        <input type="number" id="fCost" placeholder="0.00" step="0.01" value="0">
                    </div>
                    <div class="form-group">
                        <label>📸 Adjuntar Foto o Comprobante (Opcional)</label>
                        <input type="file" id="fMedia" accept="image/*" style="background:transparent; padding:0;">
                    </div>
                    <div class="form-group">
                        <label>Notas / Detalles</label>
                        <textarea id="fNotes" rows="2"></textarea>
                    </div>
                    <button class="btn-add" id="btnAddMilestone" onclick="addMilestone()">Insertar en Itinerario</button>
                </div>
            </div>
        </div>

        <div class="section-label">🗺️ Línea de Tiempo Activa</div>
        <div class="timeline-container" id="activeTimelineContainer"></div>

        <div class="history-card" id="historyCard">
            <div class="form-toggle-row" onclick="document.getElementById('historyCard').classList.toggle('open')">
                <span class="label" style="color:var(--label2);">⏳ Historial de Hitos Pasados</span>
                <span style="font-size:0.7rem; color:var(--label3);">▼</span>
            </div>
            <div class="history-body">
                <div class="timeline-container" id="historyTimelineContainer" style="margin-top:0.4rem;"></div>
            </div>
        </div>

        <div class="settings-footer">
            <button class="btn-text-action" style="color: var(--label3); text-decoration: underline;" onclick="forceSetupCredentials()">⚙️ Reconfigurar credenciales de la nube</button>
        </div>
    </div>

    <script>
        const LEGACY_SEED = [
            { id: "m1", type: "pass", title: "Fast Pass Migraciones", date: "2026-07-17", time: "14:15", code: "", cost: 0, notes: "Hora reservada confirmada para evitar colas de salida.", checklist: [{text:"Llevar QR impreso", done:false}], hasPayment: false },
            { id: "m2", type: "flight", title: "Vuelo Jetsmart JA 732 (AEP -> SCL)", date: "2026-07-17", time: "16:30", code: "GEB5VX", cost: 0, notes: "Llega 17:46. Equipaje permitido: 1 valija de ida.", checklist: [{text:"Hacer check-in 24hs antes", done:true}, {text:"Pesar mochila de mano", done:false}], hasPayment: false },
            { id: "m3", type: "flight", title: "Vuelo Arajet (SCL -> PUJ)", date: "2026-07-18", time: "00:01", code: "VNLKSD", cost: 0, notes: "Llega 08:01am a Punta Cana. Equipaje: 3 valijas totales permitidas.", checklist: [], hasPayment: false },
            { id: "m4", type: "transfer", title: "Dominican Transfer al Hotel (Bayahibe)", date: "2026-07-18", time: "08:30", code: "", cost: 150, notes: "Contacto WhatsApp: +18299174178. Costo: USD 150 a pagar en efectivo.", checklist: [{text:"Cambiar billetes chicos de USD", done:false}], hasPayment: true },
            { id: "m5", type: "hotel", title: "Reserva Hotel Bayahibe (Deluxe Tropical)", date: "2026-07-18", time: "15:00", code: "hft6wp2uw", cost: 0, notes: "Salida: 30/07/2026. Regimen Todo Incluido. Ya se encuentra pago por completo (USD 2,508.00).", address: "Bayahibe Highway, Bayahibe 23000", checklist: [], hasPayment: false },
            { id: "m6", type: "flight", title: "Vuelo Arajet de Regreso (PUJ -> SCL)", date: "2026-07-30", time: "18:39", code: "VNLKSD", cost: 0, notes: "Llega +1 Día a las 02:35am a Santiago. Equipaje: 3 valijas.", checklist: [], hasPayment: false },
            { id: "m7", type: "hotel", title: "NH Collection Plaza Santiago", date: "2026-07-30", time: "15:00", code: "8D6LZP", cost: 0, notes: "Salida: Dom 02/08 12:00 hs. Ya está paga. Código de ingreso: 8D6LZP", address: "Av. Vitacura 2610, Las Condes, Santiago", checklist: [], hasPayment: false },
            { id: "m8", type: "hotel", title: "Santiago - Segunda Reserva Alojamiento", date: "2026-08-02", time: "15:00", code: "0175571138", cost: 259.88, notes: "Check-out: Mar 04 Ago 2026 12:00 pm. Monto a pagar allá en el check-in: USD 259.88.", checklist: [], hasPayment: true },
            { id: "m9", type: "flight", title: "Vuelo Jetsmart JA 737 de Regreso (SCL -> AEP)", date: "2026-08-04", time: "18:09", code: "GEB5VX", cost: 0, notes: "Llega 21:20 a Buenos Aires. Equipaje permitido: 2 valijas de vuelta.", checklist: [], hasPayment: false }
        ];

        /* 🛒 DETECCION BASE LOCAL INTEGRANDO EL CHECK DE ATOMICIDAD DE MARCA DE TIEMPO */
        let isFreshInstall = !localStorage.getItem('trippulse_global_v2');
        let globalState = JSON.parse(localStorage.getItem('trippulse_global_v2'));
        let isSyncingLock = false;

        if (!globalState) {
            globalState = {
                updatedAt: 1, // Inicialización controlada sobre cero para hidratación asíncrona
                activeTripId: "trip_bayahibe",
                trips: [{
                    id: "trip_bayahibe",
                    name: "Bayahibe + Chile 2026",
                    cards: [
                        { id: "c1", name: "Amex Black Santander", passes: 2 },
                        { id: "c2", name: "Visa Signature Galicia", passes: 4 }
                    ],
                    insurance: { provider: "Universal Assistance", coverage: "17 Jul - 04 Ago / Global", notes: "Llevar vouchers digitales a mano." },
                    milestones: LEGACY_SEED
                }]
            };
            localStorage.setItem('trippulse_global_v2', JSON.stringify(globalState));
        }
        if (!globalState.updatedAt) globalState.updatedAt = 1;

        function getSyncCredentials() {
            let token = localStorage.getItem('wishlist_gh_token');
            let gistId = localStorage.getItem('wishlist_gh_gist');
            if (!gistId || gistId.trim() === '') {
                gistId = '206145949f30bf9663b1f7ba2ed4573a';
                localStorage.setItem('wishlist_gh_gist', gistId);
            }
            return { token, gistId };
        }

        function getActiveTrip() {
            let trip = globalState.trips.find(t => t.id === globalState.activeTripId);
            if(!trip) { trip = globalState.trips[0]; globalState.activeTripId = trip.id; }
            if(!trip.cards) {
                trip.cards = [ { id: "c_" + Date.now(), name: "Pases VIP Disponibles", passes: trip.vipPasses || 0 } ];
                delete trip.vipPasses;
            }
            return trip;
        }

        async function save() {
            globalState.updatedAt = Date.now();
            localStorage.setItem('trippulse_global_v2', JSON.stringify(globalState));
            render();
            await autoPushToCloud();
        }

        async function changeTripContext(id) {
            globalState.activeTripId = id;
            await save();
        }

        async function createNewTripContext() {
            const name = prompt("Ingresá el destino o nombre del nuevo viaje:");
            if (!name || !name.trim()) return;
            const newId = "trip_" + Date.now();
            globalState.trips.push({
                id: newId,
                name: name.trim(),
                cards: [
                    { id: "c1_" + Date.now(), name: "Amex (Fast Pass)", passes: 0 },
                    { id: "c2_" + Date.now(), name: "Visa (VIP Lounges)", passes: 0 }
                ],
                insurance: { provider: "", coverage: "", notes: "" },
                milestones: []
            });
            globalState.activeTripId = newId;
            await save();
        }

        async function deleteCurrentTripContext() {
            if (globalState.trips.length <= 1) {
                alert("No podés eliminar tu único viaje activo.");
                return;
            }
            const activeTrip = getActiveTrip();
            if (confirm(`¿Seguro que querés borrar por completo el viaje "${activeTrip.name}"?`)) {
                globalState.trips = globalState.trips.filter(t => t.id !== activeTrip.id);
                globalState.activeTripId = globalState.trips[0].id;
                await save();
            }
        }

        function toggleForm() {
            const card = document.getElementById('formCard');
            card.classList.toggle('open');
        }

        async function updateCardCounter(cardId, amount) {
            const trip = getActiveTrip();
            const card = trip.cards.find(c => c.id === cardId);
            if (card) {
                card.passes = Math.max(0, card.passes + amount);
                await save();
            }
        }

        async function deleteCardInline(cardId) {
            const trip = getActiveTrip();
            const card = trip.cards.find(c => c.id === cardId);
            if (card && confirm(`¿Seguro que querés eliminar la tarjeta "${card.name}"?`)) {
                trip.cards = trip.cards.filter(c => c.id !== cardId);
                await save();
            }
        }

        async function addNewCardInline() {
            const name = prompt("Nombre o Banco de la nueva tarjeta:");
            if(!name || !name.trim()) return;
            const trip = getActiveTrip();
            trip.cards.push({ id: "c_" + Date.now(), name: name.trim(), passes: 0 });
            await save();
        }

        async function editInsurance() {
            const trip = getActiveTrip();
            const provider = prompt("Nombre del Seguro / Nro Póliza:", trip.insurance.provider);
            const coverage = prompt("Vigencia / Alcance:", trip.insurance.coverage);
            const notes = prompt("Detalles adicionales:", trip.insurance.notes);
            
            if (provider !== null && coverage !== null && notes !== null) {
                trip.insurance = { provider, coverage, notes };
                await save();
            }
        }

        function processImageAttachment(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const max_size = 800; 
                        if (width > height) {
                            if (width > max_size) { height *= max_size / width; width = max_size; }
                        } else {
                            if (height > max_size) { width *= max_size / height; height = max_size; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function addMilestone() {
            const type = document.getElementById('fType').value;
            const title = document.getElementById('fTitle').value.trim();
            const date = document.getElementById('fDate').value;
            const time = document.getElementById('fTime').value || "12:00";
            const address = document.getElementById('fAddress').value.trim();
            const code = document.getElementById('fCode').value.trim();
            const hasPayment = document.getElementById('fHasPayment').value === 'yes';
            const cost = hasPayment ? (parseFloat(document.getElementById('fCost').value) || 0) : 0;
            const notes = document.getElementById('fNotes').value.trim();
            const fileInput = document.getElementById('fMedia');

            if (!title || !date) {
                alert("Por favor completá el título y la fecha del hito.");
                return;
            }

            const btn = document.getElementById('btnAddMilestone');
            btn.disabled = true;
            btn.textContent = "Procesando Adjunto...";

            let compressedImage = "";
            if(fileInput.files && fileInput.files[0]) {
                compressedImage = await processImageAttachment(fileInput.files[0]);
            }

            const trip = getActiveTrip();
            trip.milestones.push({
                id: 'm_' + Date.now(),
                type, title, date, time, code, cost, notes, address, passed: false, hasPayment,
                image: compressedImage,
                checklist: []
            });

            document.getElementById('fTitle').value = '';
            document.getElementById('fCode').value = '';
            document.getElementById('fAddress').value = '';
            document.getElementById('fCost').value = '0';
            document.getElementById('fHasPayment').value = 'no';
            document.getElementById('fCostContainer').style.display = 'none';
            document.getElementById('fNotes').value = '';
            document.getElementById('fMedia').value = '';
            
            btn.disabled = false;
            btn.textContent = "Insertar en Itinerario";
            
            toggleForm();
            await save();
        }

        async function deleteMilestone(id) {
            if(confirm("¿Remover esta reserva o hito del viaje?")) {
                const trip = getActiveTrip();
                trip.milestones = trip.milestones.filter(m => m.id !== id);
                await save();
            }
        }

        async function toggleMilestonePassed(id) {
            const trip = getActiveTrip();
            const milestone = trip.milestones.find(m => m.id === id);
            if(milestone) {
                milestone.passed = !milestone.passed;
                await save();
            }
        }

        async function editMilestoneNotes(id) {
            const trip = getActiveTrip();
            const milestone = trip.milestones.find(m => m.id === id);
            if (milestone) {
                const newNotes = prompt(`Editar notas para "${milestone.title}":`, milestone.notes || '');
                if (newNotes !== null) {
                    milestone.notes = newNotes.trim();
                    await save();
                }
            }
        }

        async function toggleTask(milestoneId, taskIndex) {
            const trip = getActiveTrip();
            const milestone = trip.milestones.find(m => m.id === milestoneId);
            if(milestone && milestone.checklist[taskIndex]) {
                milestone.checklist[taskIndex].done = !milestone.checklist[taskIndex].done;
                await save();
            }
        }

        async function addTaskInline(e, milestoneId) {
            if (e.key === 'Enter' || e.type === 'click') {
                const input = document.getElementById(`input_add_${milestoneId}`);
                const text = input.value.trim();
                if(!text) return;

                const trip = getActiveTrip();
                const milestone = trip.milestones.find(m => m.id === milestoneId);
                if(milestone) {
                    if(!milestone.checklist) milestone.checklist = [];
                    milestone.checklist.push({ text, done: false });
                    input.value = '';
                    await save();
                }
            }
        }

        function formatDisplayDate(dateStr) {
            const options = { weekday: 'short', day: 'numeric', month: 'short' };
            const parts = dateStr.split('-');
            const date = new Date(parts[0], parts[1] - 1, parts[2]);
            return date.toLocaleDateString('es-AR', options);
        }

        function shareWhatsApp(id) {
            const trip = getActiveTrip();
            const item = trip.milestones.find(m => m.id === id);
            let text = `✈️ *TripPulse Itinerario* — _Reserva de ${trip.name}_\n\n`;
            text += `*Hito:* ${item.title}\n`;
            text += `*Fecha/Hora:* ${formatDisplayDate(item.date)} a las ${item.time}hs\n`;
            if(item.code) text += `*Código de Reserva:* ${item.code}\n`;
            if(item.address) text += `*Dirección:* ${item.address}\n`;
            if(item.cost > 0) text += `*Monto pendiente:* USD ${item.cost}\n`;
            if(item.notes) text += `*Detalles:* ${item.notes}\n`;

            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
        }

        function getGoogleCalendarUrl(milestone) {
            const base = "https://calendar.google.com/calendar/render?action=TEMPLATE";
            const title = `TripPulse [${milestone.type.toUpperCase()}]: ${milestone.title}`;
            const cleanDate = milestone.date.replace(/-/g, '');
            const cleanTime = milestone.time.replace(/:/g, '');
            const startStr = `${cleanDate}T${cleanTime}00`;
            
            let hour = parseInt(milestone.time.split(':')[0]) + 1;
            if (isNaN(hour) || hour >= 24) hour = 12;
            const endStr = `${cleanDate}T${String(hour).padStart(2, '0')}0000`;
            
            let details = milestone.notes || '';
            if(milestone.code) details += `\nReserva: ${milestone.code}`;
            if(milestone.address) details += `\n📍 Lugar: ${milestone.address}`;
            if(milestone.cost > 0) details += `\n💰 Pendiente: USD ${milestone.cost}`;
            
            return `${base}&text=${encodeURIComponent(title)}&dates=${startStr}/${endStr}&details=${encodeURIComponent(details)}&location=${encodeURIComponent(milestone.address || '')}`;
        }

        /* 📡 CORE DE GESTION INTEGRADO: CORRIGE EL PISADO CIEGO CON DEFENSA CONTRA JSON REMOTOS VIEJOS v4.3 */
        async function autoPullFromCloud(isForcedManual = false) {
            if(isSyncingLock && !isForcedManual) return;
            const creds = getSyncCredentials();
            if(!creds.token || !creds.gistId) return;
            const syncBtn = document.getElementById('btnCloudSync');
            if(syncBtn) syncBtn.classList.add('spinning');
            try {
                const res = await fetch(`https://api.github.com/gists/${creds.gistId}?_cb=${Date.now()}`, {
                    method: 'GET',
                    headers: { 'Authorization': `token ${creds.token}` }
                });
                if(res.ok) {
                    const gistData = await res.json();
                    if(gistData.files && gistData.files["travel_timeline.json"]) {
                        const cloudContent = JSON.parse(gistData.files["travel_timeline.json"].content);
                        const cloudUpdatedAt = cloudContent.updatedAt || 0;
                        
                        /* 🛠️ HYDRATION FALLBACK DE RESCATE SI LA COLA VIENE EN BLANCO O ES PRIMER BOOTEO */
                        if(cloudUpdatedAt > globalState.updatedAt || isForcedManual || (isFreshInstall && cloudContent.trips && cloudContent.trips.length > 0)) {
                            globalState = cloudContent;
                            localStorage.setItem('trippulse_global_v2', JSON.stringify(globalState));
                            isFreshInstall = false;
                            render();
                        } else if(globalState.updatedAt > cloudUpdatedAt) {
                            await autoPushToCloud(true);
                        }
                    }
                }
            } catch(e) { 
                console.log("Descarga pasiva amortiguada."); 
            } finally { if(syncBtn) syncBtn.classList.remove('spinning'); }
        }

        async function autoPushToCloud(bypassLock = false) {
            if(isSyncingLock && !bypassLock) return;
            const creds = getSyncCredentials();
            if(!creds.token || !creds.gistId) return;
            isSyncingLock = true;
            const syncBtn = document.getElementById('btnCloudSync');
            if(syncBtn) syncBtn.classList.add('spinning');
            try {
                await fetch(`https://api.github.com/gists/${creds.gistId}`, {
                    method: 'PATCH',
                    headers: { 
                        'Authorization': `token ${creds.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: { "travel_timeline.json": { content: JSON.stringify(globalState, null, 2) } }
                    })
                });
            } catch(e) { 
                console.log("Escritura pasiva amortiguada.");
            } finally { 
                isSyncingLock = false;
                if(syncBtn) syncBtn.classList.remove('spinning'); 
            }
        }

        async function manualSync() {
            const creds = getSyncCredentials();
            if(!creds.token || !creds.gistId) {
                forceSetupCredentials();
                return;
            }
            await autoPullFromCloud(true);
            await autoPushToCloud(true);
            alert("🔄 Itinerario sincronizado con éxito.");
        }

        function buildMilestoneCardHtml(milestone) {
            let checklistHtml = '';
            if(milestone.checklist && milestone.checklist.length > 0) {
                const itemsHtml = milestone.checklist.map((task, idx) => `
                    <div class="task-item ${task.done ? 'done' : ''}" onclick="toggleTask('${milestone.id}', ${idx})">
                        <div class="task-checkbox">
                            <svg class="task-checkmark" viewBox="0 0 10 10"><path d="M2 5l2 2 4-4" fill="none" stroke="white" stroke-width="2"/></svg>
                        </div>
                        <span>${task.text}</span>
                    </div>
                `).join('');
                checklistHtml = `<div class="subchecklist-box">${itemsHtml}</div>`;
            }

            const notesText = milestone.notes || '';
            let waButtonHtml = '';
            const waMatch = notesText.match(/\+1\s?\(?\d{3}\)?\s?\d{3}-?\d{4}/) || notesText.match(/\+\d{10,13}/);
            if (waMatch) {
                const cleanNum = waMatch[0].replace(/[^0-9+]/g, '');
                waButtonHtml = `<a href="https://wa.me/${cleanNum}" target="_blank" class="btn-wa-link">📱 WA</a>`;
            }

            /* 📍 BOTÓN DE GOOGLE MAPS DIRECTO */
            let mapButtonHtml = '';
            if (milestone.address && milestone.address.trim() !== '') {
                mapButtonHtml = `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(milestone.address)}" target="_blank" class="btn-map-link">📍 Ver Mapa</a>`;
            }

            const hasPay = milestone.hasPayment !== undefined ? milestone.hasPayment : (milestone.cost > 0);
            const costHtml = hasPay 
                ? `<div style="font-size: 0.74rem; color:var(--orange); font-weight:700; background: var(--surface2); padding: 0.35rem 0.55rem; border-radius: 6px; display: inline-block;">💰 A pagar allá: USD ${milestone.cost.toLocaleString('en-US')}</div>` 
                : '';

            let notesHtml = '';
            if (notesText.trim() || milestone.image || milestone.address) {
                notesHtml = `
                    <details class="notes-dropdown">
                        <summary class="notes-summary">📝 Ver Notas / Adjunto</summary>
                        <div class="notes-content">
                            ${notesText ? `<p style="margin-bottom: 0.4rem;">${notesText}</p>` : ''}
                            ${milestone.address ? `<p style="margin-bottom: 0.4rem; color:var(--teal);">📍 <b>Ubicación:</b> ${milestone.address}</p>` : ''}
                            ${milestone.image ? `<div style="text-align:center; margin-top:0.4rem;"><img src="${milestone.image}" style="max-width:100%; border-radius:8px; border:1px solid var(--surface3);" alt="Comprobante"></div>` : ''}
                        </div>
                    </details>
                `;
            } else {
                notesHtml = `
                    <div class="notes-dropdown dimmed-dropdown">
                        <span class="notes-summary">📝 Sin notas ni adjuntos</span>
                    </div>
                `;
            }

            const googleCalUrl = getGoogleCalendarUrl(milestone);

            const typeLabels = {
                flight: "✈️ Vuelo",
                hotel: "🏨 Alojamiento",
                transfer: "🚗 Traslado",
                pass: "🎫 Pase",
                custom: "📌 Recordatorio"
            };
            const displayType = typeLabels[milestone.type] || milestone.type;

            return `
                <div class="card-meta-row">
                    <span class="datetime-stamp">${formatDisplayDate(milestone.date)} — ${milestone.time} hs</span>
                    <span class="type-badge">${displayType}</span>
                </div>
                <div class="card-title-row">
                    <button class="btn-milestone-check" onclick="toggleMilestonePassed('${milestone.id}')" title="Marcar como completado">
                        <svg viewBox="0 0 10 10"><path d="M2 5l2 2 4-4" fill="none" stroke="white" stroke-width="2"/></svg>
                    </button>
                    <div style="min-width: 0; flex: 1; display: flex; flex-direction: column; gap: 0.25rem;">
                        <div class="card-main-title">${milestone.title}</div>
                        ${milestone.code ? `<div><span class="res-code">${milestone.code}</span></div>` : ''}
                    </div>
                </div>
                
                ${costHtml}
                ${notesHtml}

                <div class="subchecklist-box" onclick="event.stopPropagation()">
                    <div class="subchecklist-title">
                        <span>Dependencias / Checklist</span>
                        <span>${milestone.checklist ? milestone.checklist.filter(c=>c.done).length : 0}/${milestone.checklist ? milestone.checklist.length : 0}</span>
                    </div>
                    ${checklistHtml}
                    <div class="add-task-inline">
                        <input type="text" id="input_add_${milestone.id}" placeholder="Añadir pendiente..." onkeypress="addTaskInline(event, '${milestone.id}')">
                        <button onclick="addTaskInline(event, '${milestone.id}')">＋</button>
                    </div>
                </div>

                <div class="card-actions">
                    ${waButtonHtml}
                    ${mapButtonHtml}
                    <a href="${googleCalUrl}" target="_blank" class="btn-action-small" style="color:var(--teal); text-decoration:none; font-weight:600;">📅 Google Cal</a>
                    <button class="btn-action-small" onclick="editMilestoneNotes('${milestone.id}')">Editar Notas</button>
                    <button class="btn-action-small" onclick="shareWhatsApp('${milestone.id}')">Compartir</button>
                    <button class="btn-action-small delete-trigger" onclick="deleteMilestone('${milestone.id}')">Eliminar</button>
                </div>
            `;
        }

        function render() {
            const trip = getActiveTrip();

            const select = document.getElementById('tripSelector');
            select.innerHTML = globalState.trips.map(t => `<option value="${t.id}" ${t.id === globalState.activeTripId ? 'selected' : ''}>📌 ${t.name}</option>`).join('');

            document.getElementById('insProvider').textContent = trip.insurance.provider || "Sin registrar";
            document.getElementById('insCoverage').textContent = trip.insurance.coverage || "Sin registrar";
            document.getElementById('insNotes').textContent = trip.insurance.notes || "No hay observaciones extras.";

            const cardBox = document.getElementById('vipCardsContainer');
            cardBox.innerHTML = trip.cards.map(c => `
                <div class="card-row-item">
                    <span class="card-row-name">💳 ${c.name}</span>
                    <div class="card-row-controls">
                        <button class="btn-counter-small" onclick="updateCardCounter('${c.id}', -1)">-</button>
                        <span class="card-row-counter">${c.passes}</span>
                        <button class="btn-counter-small" onclick="updateCardCounter('${c.id}', 1)">+</button>
                        <button class="btn-counter-small" style="background:rgba(255,69,58,0.12); color:var(--red);" onclick="deleteCardInline('${c.id}')">🗑️</button>
                    </div>
                </div>
            `).join('') + `<button class="btn-add-card-inline" onclick="addNewCardInline()">＋ Enlazar nueva tarjeta / pase</button>`;

            trip.milestones.sort((a, b) => (a.date + 'T' + a.time).localeCompare(b.date + 'T' + b.time));

            const activeContainer = document.getElementById('activeTimelineContainer');
            const historyContainer = document.getElementById('historyTimelineContainer');
            
            activeContainer.innerHTML = '';
            historyContainer.innerHTML = '';

            let totalPendingPay = 0;
            let activeCount = 0;
            let historyCount = 0;

            trip.milestones.forEach((milestone) => {
                if(!milestone.address && milestone.type === 'hotel' && milestone.id === 'm5') milestone.address = "Bayahibe Highway, Bayahibe 23000";
                if(!milestone.address && milestone.type === 'hotel' && milestone.id === 'm7') milestone.address = "Av. Vitacura 2610, Las Condes, Santiago";

                const card = document.createElement('div');
                card.className = `timeline-card is-${milestone.type} ${milestone.passed ? 'passed-milestone' : ''}`;
                card.innerHTML = buildMilestoneCardHtml(milestone);

                const hasPay = milestone.hasPayment !== undefined ? milestone.hasPayment : (milestone.cost > 0);

                if (!milestone.passed) {
                    if (hasPay) totalPendingPay += milestone.cost;
                    activeContainer.appendChild(card);
                    activeCount++;
                } else {
                    historyContainer.appendChild(card);
                    historyCount++;
                }
            });

            if(activeCount === 0) activeContainer.innerHTML = `<div class="empty-state">No hay hitos activos en el horizonte.</div>`;
            if(historyCount === 0) historyContainer.innerHTML = `<div class="empty-state">No archivaste hitos en este viaje todavía.</div>`;

            document.getElementById('valPendingPay').textContent = `USD ${totalPendingPay.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        }

        window.onload = function() {
            getSyncCredentials(); 
            render();
            setTimeout(() => {
                autoPullFromCloud();
            }, 100);
        };

        document.addEventListener("visibilitychange", async () => {
            if (!document.hidden) {
                await autoPullFromCloud();
            }
        });
    </script>
